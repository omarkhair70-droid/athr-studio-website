<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATHR — Experience Studio</title>

<style>
body{
    margin:0;
    background:#0b0b0b;
    color:#eae7e1;
    font-family: Arial, sans-serif;
}

.container{
    width:90%;
    max-width:1100px;
    margin:auto;
}

h1{
    font-size:64px;
    margin-bottom:10px;
}

p{
    color:#c5c1b9;
}

.section{
    margin:100px 0;
}

img{
    width:100%;
    border-radius:8px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:40px;
}

.case{
    margin-bottom:80px;
}

.label{
    margin-bottom:10px;
    color:#a89060;
    font-size:14px;
}
</style>

</head>
<body>

<div class="container">

<!-- HERO -->
<div class="section">
    <h1>ATHR</h1>
    <p>From a place… to a feeling.</p>
    <img src="images/cover-collage.jpeg">
</div>

<!-- CASE 1 -->
<div class="section case">
    <div class="label">Boulevard — Before / After</div>
    <div class="grid">
        <img src="images/boulevard-before.jpeg">
        <img src="images/boulevard-after.jpeg">
    </div>
</div>

<!-- CASE 2 -->
<div class="section case">
    <div class="label">Cavello — Before / After</div>
    <div class="grid">
        <img src="images/cavello-before.jpeg">
        <img src="images/cavello-after.jpeg">
    </div>
</div>

<!-- CASE 3 -->
<div class="section case">
    <div class="label">La Roche — Before / After</div>
    <div class="grid">
        <img src="images/laroche-before.jpeg">
        <img src="images/laroche-after.jpeg">
    </div>
</div>

<!-- FOUNDER -->
<div class="section grid">
    <div>
        <h2>The mind behind ATHR</h2>
        <p>
        ATHR is not decoration.<br><br>
        It’s a way of thinking about space.<br><br>
        Built by Omar Khair — a creative mind transforming cafés into experiences people feel.
        </p>
    </div>
    <img src="images/founder.jpeg">
</div>

</div>

</body>
</html>
